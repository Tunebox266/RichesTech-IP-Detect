<!-- templates/events/feedback_form.html -->
{% extends 'base.html' %}
{% load static %}

{% block title %}Event Feedback - {{ event.title }}{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Event Feedback</h4>
                </div>
                <div class="card-body">
                    <h5>{{ event.title }}</h5>
                    <p class="text-muted">{{ event.start_date|date:"F d, Y" }}</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">How would you rate this event?</label>
                            <div class="rating-stars">
                                {% for i in "12345"|make_list %}
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="rating" 
                                           id="rating{{ i }}" value="{{ i }}" required>
                                    <label class="form-check-label" for="rating{{ i }}">
                                        {{ i }} star{% if i != '1' %}s{% endif %}
                                    </label>
                                </div>
                                {% endfor %}
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Additional Comments</label>
                            <textarea name="comment" class="form-control" rows="5" 
                                      placeholder="Share your thoughts about the event..."></textarea>
                        </div>
                        
                        <div class="text-end">
                            <a href="{% url 'events:my_events' %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Submit Feedback</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
