{% extends "admin/change_form.html" %}
{% load static %}

{% block after_field_sets %}
{% if original and original.qr_code %}
<div style="margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 5px;">
    <h3>QR Code Preview</h3>
    <div style="text-align: center;">
        <img src="{{ original.qr_code.url }}" style="max-width: 200px; border: 1px solid #ddd; padding: 10px; background: white;">
        <p><small>Generated: {{ original.issued_at|date:"Y-m-d H:i" }}</small></p>
    </div>
</div>
{% endif %}
{% endblock %}
